# Flutter Rust Bridge Configuration
# See: https://cjycode.com/flutter_rust_bridge/guides/quickstart

# Rust input configuration
rust_input: crate::api
rust_root: .
rust_output: src/frb_generated.rs

# Dart output configuration
dart_output: ../../../client-mobile/lib/generated/rust

# Class name prefix for generated Dart code
dart_entrypoint_class_name: GuardynCrypto

# Full dependency mode for accurate type resolution
full_dep: true

# Enable WASM for web support
web: true

# Extra Dart preamble imports
dart_preamble: |
  // Auto-generated by flutter_rust_bridge
  // DO NOT EDIT MANUALLY
  //
  // This file provides Dart bindings for guardyn-crypto Rust library.
  // See: https://github.com/guardyn/guardyn/tree/main/backend/crates/crypto-ffi
