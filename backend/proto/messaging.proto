syntax = "proto3";

package guardyn.messaging;

import "common.proto";

// ============================================================================
// Messaging Service - 1-on-1 and group messaging with E2EE
// ============================================================================

service MessagingService {
  // Send 1-on-1 encrypted message
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);

  // Receive messages (streaming from server)
  rpc ReceiveMessages(ReceiveMessagesRequest) returns (stream Message);

  // Get message history
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);

  // Get list of conversations
  rpc GetConversations(GetConversationsRequest) returns (GetConversationsResponse);

  // Mark message as read (send read receipt)
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);

  // Delete message (for self or for everyone)
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);

  // Send typing indicator
  rpc SendTypingIndicator(TypingIndicatorRequest) returns (TypingIndicatorResponse);

  // Create group chat
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);

  // Add member to group
  rpc AddGroupMember(AddGroupMemberRequest) returns (AddGroupMemberResponse);

  // Remove member from group
  rpc RemoveGroupMember(RemoveGroupMemberRequest) returns (RemoveGroupMemberResponse);

  // Send group message
  rpc SendGroupMessage(SendGroupMessageRequest) returns (SendGroupMessageResponse);

  // Get group messages
  rpc GetGroupMessages(GetGroupMessagesRequest) returns (GetGroupMessagesResponse);

  // Get all groups for the current user
  rpc GetGroups(GetGroupsRequest) returns (GetGroupsResponse);

  // Get group details by ID
  rpc GetGroupById(GetGroupByIdRequest) returns (GetGroupByIdResponse);

  // Update group (name, icon, description)
  rpc UpdateGroup(UpdateGroupRequest) returns (UpdateGroupResponse);

  // Leave a group
  rpc LeaveGroup(LeaveGroupRequest) returns (LeaveGroupResponse);

  // Clear all messages in a conversation (local delete for current user)
  rpc ClearChat(ClearChatRequest) returns (ClearChatResponse);

  // ========================================================================
  // Phase 2: Message Reactions
  // ========================================================================

  // Add reaction to a message
  rpc AddReaction(AddReactionRequest) returns (AddReactionResponse);

  // Remove reaction from a message
  rpc RemoveReaction(RemoveReactionRequest) returns (RemoveReactionResponse);

  // Get all reactions for a message
  rpc GetReactions(GetReactionsRequest) returns (GetReactionsResponse);

  // ========================================================================
  // Phase 2: Enhanced Read Receipts
  // ========================================================================

  // Send read receipt for a conversation
  rpc SendReadReceipt(SendReadReceiptRequest) returns (SendReadReceiptResponse);

  // Get read receipts for a conversation (who read what)
  rpc GetReadReceipts(GetReadReceiptsRequest) returns (GetReadReceiptsResponse);

  // ========================================================================
  // Phase 2: Reply/Quote/Forward
  // ========================================================================

  // Forward a message to another conversation
  rpc ForwardMessage(ForwardMessageRequest) returns (ForwardMessageResponse);

  // ========================================================================
  // Phase 2: Message Edit
  // ========================================================================

  // Edit a previously sent message
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);

  // ========================================================================
  // Phase 2: Message Search
  // ========================================================================

  // Search messages (returns encrypted content for client-side search)
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);

  // ========================================================================
  // Phase 2: Disappearing Messages
  // ========================================================================

  // Set disappearing messages config for a conversation
  rpc SetDisappearingMessages(SetDisappearingMessagesRequest) returns (SetDisappearingMessagesResponse);

  // Get disappearing messages config
  rpc GetDisappearingConfig(GetDisappearingConfigRequest) returns (GetDisappearingConfigResponse);

  // ========================================================================
  // Phase 3: User Blocking
  // ========================================================================

  // Block a user from messaging you
  rpc BlockUser(BlockUserRequest) returns (BlockUserResponse);

  // Unblock a previously blocked user
  rpc UnblockUser(UnblockUserRequest) returns (UnblockUserResponse);

  // Get list of blocked users
  rpc GetBlockedUsers(GetBlockedUsersRequest) returns (GetBlockedUsersResponse);

  // ========================================================================
  // Phase 3: Delete Conversation
  // ========================================================================

  // Delete a conversation (removes from user's list, keeps for other party)
  rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse);

  // Health check
  rpc Health(HealthRequest) returns (common.HealthStatus);
}

// ============================================================================
// 1-on-1 Messaging
// ============================================================================

message SendMessageRequest {
  string access_token = 1; // Authentication
  string recipient_user_id = 2; // Target user UUID
  string recipient_device_id = 3; // Target device UUID (optional, if not set - all devices)

  // Encrypted message content (Double Ratchet encrypted)
  bytes encrypted_content = 4;

  // Message metadata
  MessageType message_type = 5;
  string client_message_id = 6; // Client-generated UUID for deduplication
  common.Timestamp client_timestamp = 7;

  // Optional: media attachment reference
  string media_id = 8; // Reference to media uploaded via Media Service

  // Recipient username for display (used in conversation list)
  string recipient_username = 9;

  // X3DH prekey data for first message (allows recipient to create responder session)
  // Base64-encoded X3DHPrekeyMessage containing: sender_identity_key, ephemeral_key, used_otpk_id
  string x3dh_prekey = 10;

  // Phase 2: Reply/Quote support
  ThreadReference thread_reference = 11;

  // Phase 2: Voice message metadata
  VoiceMessageMetadata voice_metadata = 12;
}

enum MessageType {
  TEXT = 0;
  IMAGE = 1;
  VIDEO = 2;
  AUDIO = 3;
  FILE = 4;
  VOICE_NOTE = 5;
  LOCATION = 6;
}

message SendMessageResponse {
  oneof result {
    SendMessageSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message SendMessageSuccess {
  string message_id = 1; // Server-generated UUID
  common.Timestamp server_timestamp = 2;
  DeliveryStatus delivery_status = 3;
}

enum DeliveryStatus {
  PENDING = 0; // Queued for delivery
  SENT = 1; // Sent to recipient's device
  DELIVERED = 2; // Delivered to recipient's device
  READ = 3; // Read by recipient
  FAILED = 4; // Delivery failed
}

// ============================================================================
// Receiving Messages
// ============================================================================

message ReceiveMessagesRequest {
  string access_token = 1; // Authentication
  bool include_history = 2; // If true, sends offline messages first
}

message Message {
  string message_id = 1; // Server UUID
  string sender_user_id = 2;
  string sender_device_id = 3;
  string recipient_user_id = 4;
  string recipient_device_id = 5;

  // Encrypted content
  bytes encrypted_content = 6;

  // Metadata
  MessageType message_type = 7;
  string client_message_id = 8;
  common.Timestamp client_timestamp = 9;
  common.Timestamp server_timestamp = 10;

  // Delivery tracking
  DeliveryStatus delivery_status = 11;

  // Media reference
  string media_id = 12;

  // Deletion flag
  bool is_deleted = 13;

  // X3DH prekey data for first message (allows recipient to create responder session)
  string x3dh_prekey = 14;

  // Phase 2: Reply/Quote support
  ThreadReference thread_reference = 15;

  // Phase 2: Forward support
  ForwardInfo forward_info = 16;

  // Phase 2: Edit tracking
  int32 edit_version = 17;
  common.Timestamp last_edited_at = 18;

  // Phase 2: Voice message metadata
  VoiceMessageMetadata voice_metadata = 19;

  // Phase 2: Reactions summary (aggregated)
  repeated ReactionSummary reaction_summaries = 20;
}

// Aggregated reaction count for UI display
message ReactionSummary {
  string emoji = 1;
  int32 count = 2;
  bool user_reacted = 3;  // Did current user react with this emoji?
}

// ============================================================================
// Message History
// ============================================================================

message GetMessagesRequest {
  string access_token = 1;
  string conversation_user_id = 2; // User ID of the conversation partner
  string conversation_id = 6; // Conversation ID (alternative to conversation_user_id)

  // Pagination
  common.PaginationRequest pagination = 3;
  int32 limit = 7; // Simple limit (alternative to pagination)

  // Time range filtering
  common.Timestamp start_time = 4;
  common.Timestamp end_time = 5;
}

message GetMessagesResponse {
  oneof result {
    GetMessagesSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message GetMessagesSuccess {
  repeated Message messages = 1;
  common.PaginationResponse pagination = 2;
  bool has_more = 3; // True if there are more messages available
}

// ============================================================================
// Conversations List
// ============================================================================

message GetConversationsRequest {
  string access_token = 1;
  uint32 limit = 2; // Max results (default: 50, max: 100)
}

message GetConversationsResponse {
  oneof result {
    GetConversationsSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message GetConversationsSuccess {
  repeated Conversation conversations = 1;
}

message Conversation {
  string conversation_id = 1;
  string user_id = 2; // The other user in the conversation
  string username = 3; // Username of the other user
  Message last_message = 4; // Last message in conversation
  uint32 unread_count = 5; // Number of unread messages
  common.Timestamp updated_at = 6; // Last activity timestamp
}

// ============================================================================
// Read Receipts
// ============================================================================

message MarkAsReadRequest {
  string access_token = 1;
  repeated string message_ids = 2; // UUIDs of messages to mark as read
}

message MarkAsReadResponse {
  oneof result {
    MarkAsReadSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message MarkAsReadSuccess {
  uint32 messages_marked = 1;
  int32 marked_count = 2; // Number of messages marked (alternative field name)
  common.Timestamp timestamp = 3; // Server timestamp of operation
}

// ============================================================================
// Message Deletion
// ============================================================================

message DeleteMessageRequest {
  string access_token = 1;
  string message_id = 2; // UUID
  string conversation_id = 4; // Conversation ID (required for ScyllaDB deletion)
  bool delete_for_everyone = 3; // If true, deletes for all participants
}

message DeleteMessageResponse {
  oneof result {
    DeleteMessageSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message DeleteMessageSuccess {
  bool deleted = 1;
  string message_id = 2; // Echo back the message ID
  common.Timestamp timestamp = 3; // Server timestamp of deletion
}

// ============================================================================
// Clear Chat History
// ============================================================================

message ClearChatRequest {
  string access_token = 1;
  string conversation_id = 2; // Conversation to clear
}

message ClearChatResponse {
  oneof result {
    ClearChatSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message ClearChatSuccess {
  uint32 deleted_count = 1; // Number of messages deleted
  common.Timestamp timestamp = 2; // Server timestamp of operation
}

// ============================================================================
// Typing Indicators
// ============================================================================

message TypingIndicatorRequest {
  string access_token = 1;
  string recipient_user_id = 2;
  bool is_typing = 3; // true = started typing, false = stopped typing
}

message TypingIndicatorResponse {
  oneof result {
    TypingIndicatorSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message TypingIndicatorSuccess {
  bool sent = 1;
}

// ============================================================================
// Group Messaging
// ============================================================================

message CreateGroupRequest {
  string access_token = 1;
  string group_name = 2;
  repeated string member_user_ids = 3; // Initial members

  // MLS group state (encrypted with OpenMLS)
  bytes mls_group_state = 4;

  // Optional: group icon and description
  string icon_media_id = 5;      // Reference to media in MediaService
  string description = 6;        // Optional group description
}

message CreateGroupResponse {
  oneof result {
    CreateGroupSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message CreateGroupSuccess {
  string group_id = 1; // UUID
  common.Timestamp created_at = 2;
}

message AddGroupMemberRequest {
  string access_token = 1;
  string group_id = 2;
  string member_user_id = 3;
  string member_device_id = 4;  // Device ID for MLS key package fetching

  // Updated MLS group state
  bytes mls_group_state = 5;
}

message AddGroupMemberResponse {
  oneof result {
    AddGroupMemberSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message AddGroupMemberSuccess {
  bool added = 1;
}

message RemoveGroupMemberRequest {
  string access_token = 1;
  string group_id = 2;
  string member_user_id = 3;

  // Updated MLS group state
  bytes mls_group_state = 4;
}

message RemoveGroupMemberResponse {
  oneof result {
    RemoveGroupMemberSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message RemoveGroupMemberSuccess {
  bool removed = 1;
}

message SendGroupMessageRequest {
  string access_token = 1;
  string group_id = 2;

  // MLS encrypted content
  bytes encrypted_content = 3;

  MessageType message_type = 4;
  string client_message_id = 5;
  common.Timestamp client_timestamp = 6;

  string media_id = 7; // Optional

  // Phase 2: Reply/Quote support
  ThreadReference thread_reference = 8;

  // Phase 2: Voice message metadata
  VoiceMessageMetadata voice_metadata = 9;
}

message SendGroupMessageResponse {
  oneof result {
    SendGroupMessageSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message SendGroupMessageSuccess {
  string message_id = 1;
  common.Timestamp server_timestamp = 2;
}

message GetGroupMessagesRequest {
  string access_token = 1;
  string group_id = 2;
  common.PaginationRequest pagination = 3;
  int32 limit = 6; // Simple limit (alternative to pagination)
  common.Timestamp start_time = 4;
  common.Timestamp end_time = 5;
}

message GetGroupMessagesResponse {
  oneof result {
    GetGroupMessagesSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message GetGroupMessagesSuccess {
  repeated GroupMessage messages = 1;
  common.PaginationResponse pagination = 2;
}

message GroupMessage {
  string message_id = 1;
  string group_id = 2;
  string sender_user_id = 3;
  string sender_device_id = 4;
  string sender_username = 12; // Username of the sender for display

  bytes encrypted_content = 5;

  MessageType message_type = 6;
  string client_message_id = 7;
  common.Timestamp client_timestamp = 8;
  common.Timestamp server_timestamp = 9;

  string media_id = 10;
  bool is_deleted = 11; // Soft deletion flag

  // Phase 2: Reply/Quote support
  ThreadReference thread_reference = 13;

  // Phase 2: Forward support
  ForwardInfo forward_info = 14;

  // Phase 2: Edit tracking
  int32 edit_version = 15;
  common.Timestamp last_edited_at = 16;

  // Phase 2: Voice message metadata
  VoiceMessageMetadata voice_metadata = 17;

  // Phase 2: Reactions summary (aggregated)
  repeated ReactionSummary reaction_summaries = 18;
}

// ============================================================================
// Get Groups (List all groups for user)
// ============================================================================

message GetGroupsRequest {
  string access_token = 1;
  int32 limit = 2; // Max results (default: 50, max: 100)
  string cursor = 3; // Pagination cursor
}

message GetGroupsResponse {
  oneof result {
    GetGroupsSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message GetGroupsSuccess {
  repeated GroupInfo groups = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message GroupInfo {
  string group_id = 1;
  string name = 2;
  string creator_user_id = 3;
  repeated GroupMemberInfo members = 4;
  common.Timestamp created_at = 5;
  int32 member_count = 6;
  GroupMessage last_message = 7; // Optional: for preview
  string icon_media_id = 8;      // Reference to media in MediaService
  string description = 9;        // Optional group description
}

message GroupMemberInfo {
  string user_id = 1;
  string username = 2;
  string device_id = 3;
  string role = 4; // "owner", "admin", "member"
  common.Timestamp joined_at = 5;
  string avatar_media_id = 6;    // Reference to avatar in MediaService
  string display_name = 7;       // Optional display name
}

// ============================================================================
// Get Group By ID
// ============================================================================

message GetGroupByIdRequest {
  string access_token = 1;
  string group_id = 2;
}

message GetGroupByIdResponse {
  oneof result {
    GetGroupByIdSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message GetGroupByIdSuccess {
  GroupInfo group = 1;
}

// ============================================================================
// Update Group
// ============================================================================

message UpdateGroupRequest {
  string access_token = 1;
  string group_id = 2;
  string name = 3;               // Optional: new group name
  string icon_media_id = 4;      // Optional: new icon media ID from MediaService
  string description = 5;        // Optional: new group description
}

message UpdateGroupResponse {
  oneof result {
    UpdateGroupSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message UpdateGroupSuccess {
  GroupInfo group = 1;
}

// ============================================================================
// Leave Group
// ============================================================================

message LeaveGroupRequest {
  string access_token = 1;
  string group_id = 2;
}

message LeaveGroupResponse {
  oneof result {
    LeaveGroupSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message LeaveGroupSuccess {
  bool left = 1;
}

// ============================================================================
// Message Reactions
// ============================================================================

message Reaction {
  string reaction_id = 1;       // Server-generated UUID
  string message_id = 2;        // Target message UUID
  string user_id = 3;           // User who reacted
  string emoji = 4;             // Unicode emoji (e.g., "👍", "❤️", "😂")
  common.Timestamp created_at = 5;
}

message AddReactionRequest {
  string access_token = 1;
  string message_id = 2;        // Target message UUID
  string conversation_id = 3;   // Conversation UUID (for efficient lookup)
  string emoji = 4;             // Unicode emoji
  bool is_group = 5;            // True if group message
}

message AddReactionResponse {
  oneof result {
    AddReactionSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message AddReactionSuccess {
  Reaction reaction = 1;
}

message RemoveReactionRequest {
  string access_token = 1;
  string message_id = 2;
  string conversation_id = 3;
  string emoji = 4;             // Which emoji to remove
  bool is_group = 5;
}

message RemoveReactionResponse {
  oneof result {
    RemoveReactionSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message RemoveReactionSuccess {
  bool removed = 1;
}

message GetReactionsRequest {
  string access_token = 1;
  string message_id = 2;
  string conversation_id = 3;
  bool is_group = 4;
}

message GetReactionsResponse {
  oneof result {
    GetReactionsSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message GetReactionsSuccess {
  repeated Reaction reactions = 1;
}

// ============================================================================
// Read Receipts (Enhanced)
// ============================================================================

message ReadReceipt {
  string conversation_id = 1;
  string user_id = 2;
  string last_read_message_id = 3;
  common.Timestamp timestamp = 4;
}

message SendReadReceiptRequest {
  string access_token = 1;
  string conversation_id = 2;
  string last_read_message_id = 3;
  bool is_group = 4;
}

message SendReadReceiptResponse {
  oneof result {
    SendReadReceiptSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message SendReadReceiptSuccess {
  common.Timestamp timestamp = 1;
}

message GetReadReceiptsRequest {
  string access_token = 1;
  string conversation_id = 2;
  bool is_group = 3;
}

message GetReadReceiptsResponse {
  oneof result {
    GetReadReceiptsSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message GetReadReceiptsSuccess {
  repeated ReadReceipt receipts = 1;
}

// ============================================================================
// Reply / Quote / Forward
// ============================================================================

// Thread reference for replies/quotes
message ThreadReference {
  string reply_to_message_id = 1;   // Original message being replied to
  string quoted_content_hash = 2;   // SHA-256 hash of original content (for verification)
  string quoted_sender_id = 3;      // Original sender's user ID
  string quoted_sender_name = 4;    // Original sender's display name (cached)
  bytes encrypted_quote_preview = 5; // Encrypted preview of quoted message (optional)
}

// Forward metadata
message ForwardInfo {
  string original_message_id = 1;
  string original_sender_id = 2;
  string original_sender_name = 3;
  common.Timestamp original_timestamp = 4;
  int32 forward_count = 5;          // How many times this message has been forwarded
}

message ForwardMessageRequest {
  string access_token = 1;
  string source_message_id = 2;       // Message to forward
  string source_conversation_id = 3;  // Source conversation
  bool source_is_group = 4;           // Is source a group?

  // Target destination
  string target_conversation_id = 5;  // Destination conversation
  bool target_is_group = 6;           // Is target a group?
  string target_user_id = 7;          // Target user (for 1-on-1)

  // Re-encrypted content for target
  bytes encrypted_content = 8;
  string client_message_id = 9;
}

message ForwardMessageResponse {
  oneof result {
    ForwardMessageSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message ForwardMessageSuccess {
  string message_id = 1;
  common.Timestamp server_timestamp = 2;
}

// ============================================================================
// Message Edit
// ============================================================================

message EditMessageRequest {
  string access_token = 1;
  string message_id = 2;
  string conversation_id = 3;
  bool is_group = 4;

  bytes encrypted_content = 5;        // New encrypted content
  common.Timestamp client_timestamp = 6;
}

message EditMessageResponse {
  oneof result {
    EditMessageSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message EditMessageSuccess {
  string message_id = 1;
  int32 edit_version = 2;             // Incremented on each edit
  common.Timestamp server_timestamp = 3;
}

message MessageEdit {
  string message_id = 1;
  bytes encrypted_content = 2;
  int32 edit_version = 3;
  common.Timestamp edit_timestamp = 4;
  string edited_by = 5;               // User ID who made the edit
}

// ============================================================================
// Voice Messages
// ============================================================================

message VoiceMessageMetadata {
  string media_id = 1;               // Reference to media in Media Service
  int32 duration_ms = 2;             // Duration in milliseconds
  bytes waveform = 3;                // Audio waveform for UI visualization (100 samples, 0-255)
  string codec = 4;                  // Audio codec (e.g., "opus", "aac")
  int32 sample_rate = 5;             // Sample rate in Hz
  int32 bitrate = 6;                 // Bitrate in bps
}

// ============================================================================
// Message Search
// ============================================================================

message SearchMessagesRequest {
  string access_token = 1;
  string query = 2;                   // Search query (will be applied to decrypted content client-side)

  // Filter options
  string conversation_id = 3;         // Optional: limit to specific conversation
  bool is_group = 4;
  common.Timestamp start_time = 5;    // Optional: date range start
  common.Timestamp end_time = 6;      // Optional: date range end
  repeated MessageType message_types = 7; // Optional: filter by type

  // Pagination
  int32 limit = 8;
  string cursor = 9;
}

message SearchMessagesResponse {
  oneof result {
    SearchMessagesSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message SearchMessagesSuccess {
  repeated SearchResult results = 1;
  string next_cursor = 2;
  bool has_more = 3;
  int32 total_count = 4;              // Approximate total matches
}

message SearchResult {
  string message_id = 1;
  string conversation_id = 2;
  bool is_group = 3;
  string sender_user_id = 4;
  bytes encrypted_content = 5;
  common.Timestamp server_timestamp = 6;
  MessageType message_type = 7;

  // Context for search highlighting (client will decrypt and highlight)
  string conversation_name = 8;       // Conversation or group name for display
}

// ============================================================================
// Disappearing Messages
// ============================================================================

message DisappearingConfig {
  string conversation_id = 1;
  int32 ttl_seconds = 2;              // 0 = disabled, else auto-delete after TTL
  string set_by_user_id = 3;          // Who configured this
  common.Timestamp updated_at = 4;
}

message SetDisappearingMessagesRequest {
  string access_token = 1;
  string conversation_id = 2;
  bool is_group = 3;
  int32 ttl_seconds = 4;              // 0 = disable, common values: 86400 (1d), 604800 (7d)
}

message SetDisappearingMessagesResponse {
  oneof result {
    SetDisappearingMessagesSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message SetDisappearingMessagesSuccess {
  DisappearingConfig config = 1;
}

message GetDisappearingConfigRequest {
  string access_token = 1;
  string conversation_id = 2;
  bool is_group = 3;
}

message GetDisappearingConfigResponse {
  oneof result {
    GetDisappearingConfigSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message GetDisappearingConfigSuccess {
  DisappearingConfig config = 1;
}

// ============================================================================
// Health Check
// ============================================================================

message HealthRequest {}

// ============================================================================
// User Blocking (Phase 3)
// ============================================================================

message BlockUserRequest {
  string access_token = 1;
  string blocked_user_id = 2;          // User ID to block
}

message BlockUserResponse {
  oneof result {
    BlockUserSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message BlockUserSuccess {
  string blocked_user_id = 1;
  common.Timestamp blocked_at = 2;
}

message UnblockUserRequest {
  string access_token = 1;
  string user_id = 2;                   // User ID to unblock
}

message UnblockUserResponse {
  oneof result {
    UnblockUserSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message UnblockUserSuccess {
  string user_id = 1;
}

message GetBlockedUsersRequest {
  string access_token = 1;
}

message GetBlockedUsersResponse {
  oneof result {
    GetBlockedUsersSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message GetBlockedUsersSuccess {
  repeated BlockedUser blocked_users = 1;
}

message BlockedUser {
  string user_id = 1;
  string username = 2;
  common.Timestamp blocked_at = 3;
}

// ============================================================================
// Delete Conversation (Phase 3)
// ============================================================================

message DeleteConversationRequest {
  string access_token = 1;
  string conversation_id = 2;
}

message DeleteConversationResponse {
  oneof result {
    DeleteConversationSuccess success = 1;
    common.ErrorResponse error = 2;
  }
}

message DeleteConversationSuccess {
  string conversation_id = 1;
}
