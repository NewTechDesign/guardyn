# Guardyn cargo-deny Configuration
# Run with: cargo deny check
# See: https://embarkstudios.github.io/cargo-deny/

# cargo-deny v2 configuration
[graph]
# All crates are considered
all-features = true
no-default-features = false

[advisories]
# RUSTSEC database
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Ignore specific advisories (with justification)
ignore = [
    "RUSTSEC-2024-0388", # derivative - waiting for dependency update
    "RUSTSEC-2024-0384", # instant - waiting for dependency update  
    "RUSTSEC-2024-0436", # paste - waiting for dependency update
    "RUSTSEC-2024-0437", # protobuf recursion - tracked separately
    "RUSTSEC-2023-0071", # rsa Marvin attack - tracked separately
    "RUSTSEC-2025-0134", # rustls-pemfile - waiting for dependency update
]

[licenses]
version = 2

# Confidence threshold for license detection
confidence-threshold = 0.8

# List of allowed licenses (SPDX expressions)
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]

# Private crates that don't need a license
private = { ignore = true }

# Clarifications for specific crates
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
# Multiple versions of the same crate
multiple-versions = "warn"

# Wildcards in version requirements (allow for workspace crates)
wildcards = "allow"

# Crates that are not allowed
deny = [
    # Example: { crate = "openssl", reason = "Use rustls instead" }
]

# Allow specific duplicates
skip = [
    # Allow multiple versions during transition
    # { crate = "some-crate@*" }
]

# Allow tree-wide duplicates
skip-tree = [
    # { crate = "some-crate@*" }
]

[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"

# Allow specific Git repositories
allow-git = [
    # "https://github.com/example/repo"
]

# Allow specific registries
allow-registry = [
    "https://github.com/rust-lang/crates.io-index"
]

[sources.allow-org]
# Organizations whose crates can be used from Git
github = []
gitlab = []
bitbucket = []
