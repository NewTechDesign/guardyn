# Guardyn cargo-deny Configuration
# Run with: cargo deny check
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
# All crates are considered
all-features = true
no-default-features = false

[advisories]
# RUSTSEC database
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Fail on vulnerabilities
vulnerability = "deny"

# Warn on unmaintained crates
unmaintained = "warn"

# Warn on yanked versions
yanked = "warn"

# Ignore specific advisories (with justification)
ignore = [
    # Example: "RUSTSEC-2023-0001", # Reason for ignoring
]

[licenses]
# Confidence threshold for license detection
confidence-threshold = 0.8

# List of allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]

# Deny copyleft licenses
deny = [
    "GPL-1.0",
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-1.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
]

# Clarifications for specific crates
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [
    { path = "LICENSE", hash = 0x001c7e6c }
]

[bans]
# Multiple versions of the same crate
multiple-versions = "warn"

# Wildcards in version requirements
wildcards = "deny"

# Crates that are not allowed
deny = [
    # Example: { name = "openssl", reason = "Use rustls instead" }
]

# Allow specific duplicates
skip = [
    # Allow multiple versions during transition
    # { name = "some-crate", version = "*" }
]

# Allow tree-wide duplicates
skip-tree = [
    # { name = "some-crate", version = "*" }
]

[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"

# Allow specific Git repositories
allow-git = [
    # "https://github.com/example/repo"
]

# Allow specific registries
allow-registry = [
    "https://github.com/rust-lang/crates.io-index"
]

[sources.allow-org]
# Organizations whose crates can be used from Git
github = []
gitlab = []
bitbucket = []
