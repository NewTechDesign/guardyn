name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      build-backend:
        description: 'Build backend services'
        type: boolean
        default: false
        required: true
      build-frontend:
        description: 'Build frontend apps'
        type: boolean
        default: true
        required: true
      publish-release:
        description: 'Publish release to GitHub'
        type: boolean
        default: true
        required: true
      domain:
        description: 'Domain for self-hosted deployment (e.g., nothingcore.duckdns.org)'
        type: string
        default: 'nothingcore.duckdns.org'
        required: false
      production-build:
        description: 'Build for production (HTTPS/WSS enabled)'
        type: boolean
        default: true
        required: true

env:
  CARGO_TERM_COLOR: always
  GUARDYN_DOMAIN: ${{ github.event.inputs.domain || 'nothingcore.duckdns.org' }}
  PRODUCTION_BUILD: ${{ github.event.inputs.production-build == 'true' }}
  WS_SECURE: ${{ github.event.inputs.production-build == 'true' && 'true' || 'false' }}
  WS_PORT: ${{ github.event.inputs.production-build == 'true' && '443' || '8081' }}

jobs:
  publish-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build-backend == 'true' || github.event_name == 'push' }}
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config cmake

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release artifacts
        working-directory: ./backend
        run: cargo build --release --locked

      - name: Install Syft for SBOM generation
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: syft dir:./backend -o spdx-json > sbom.spdx.json
        continue-on-error: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts
        run: |
          for binary in backend/target/release/*-service; do
            cosign sign-blob --yes \
              --output-signature "${binary}.sig" \
              "$binary" || true
          done
        continue-on-error: true

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-release
          path: |
            backend/target/release/*-service
            backend/target/release/*.sig
            sbom.spdx.json

  build-desktop-linux:
    name: Build Desktop Linux
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build-frontend == 'true' || github.event_name == 'push' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev protobuf-compiler imagemagick libfuse2 libarchive-tools patchelf desktop-file-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-desktop/package-lock.json

      - name: Install npm dependencies
        working-directory: ./client-desktop
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-release-${{ hashFiles('client-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-release-

      - name: Generate Tauri icons
        run: |
          mkdir -p client-desktop/src-tauri/icons
          convert landing/media/logo.png -resize 512x512 client-desktop/src-tauri/icons/icon.png
          convert landing/media/logo.png -resize 256x256 client-desktop/src-tauri/icons/128x128.png
          convert landing/media/logo.png -resize 512x512 client-desktop/src-tauri/icons/128x128@2x.png
          convert landing/media/logo.png -resize 256x256 client-desktop/src-tauri/icons/icon.icns
          convert landing/media/logo.png -resize 256x256 client-desktop/src-tauri/icons/icon.ico
          convert landing/media/logo.png -resize 32x32 client-desktop/src-tauri/icons/32x32.png
          convert landing/media/logo.png -resize 512x512 client-desktop/src-tauri/icons/512x512.png
          convert landing/media/logo.png -resize 1024x1024 client-desktop/src-tauri/icons/512x512@2x.png
          convert landing/media/logo.png -resize 107x107 client-desktop/src-tauri/icons/Square107x107Logo.png
          convert landing/media/logo.png -resize 142x142 client-desktop/src-tauri/icons/Square142x142Logo.png
          convert landing/media/logo.png -resize 150x150 client-desktop/src-tauri/icons/Square150x150Logo.png
          convert landing/media/logo.png -resize 30x30 client-desktop/src-tauri/icons/Square30x30Logo.png
          convert landing/media/logo.png -resize 310x310 client-desktop/src-tauri/icons/Square310x310Logo.png
          convert landing/media/logo.png -resize 44x44 client-desktop/src-tauri/icons/Square44x44Logo.png
          convert landing/media/logo.png -resize 71x71 client-desktop/src-tauri/icons/Square71x71Logo.png
          convert landing/media/logo.png -resize 89x89 client-desktop/src-tauri/icons/Square89x89Logo.png
          convert landing/media/logo.png -resize 50x50 client-desktop/src-tauri/icons/StoreLogo.png

      - name: Build desktop app
        id: build
        working-directory: ./client-desktop
        run: |
          export GUARDYN_DOMAIN="${{ env.GUARDYN_DOMAIN }}"
          export WS_SECURE="${{ env.WS_SECURE }}"
          export WS_PORT="${{ env.WS_PORT }}"
          npm run tauri build -- --bundles deb,appimage 2>&1 | tee ../tauri-build-linux.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-linux
          path: tauri-build-linux.log

      - name: Upload Linux desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-release
          path: |
            client-desktop/target/release/bundle/**/*.deb
            client-desktop/target/release/bundle/**/*.AppImage

  build-desktop-macos:
    name: Build Desktop macOS
    runs-on: macos-latest
    if: ${{ github.event.inputs.build-frontend == 'true' || github.event_name == 'push' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: |
          brew install protobuf
          brew install imagemagick

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-desktop/package-lock.json

      - name: Install npm dependencies
        working-directory: ./client-desktop
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-release-${{ hashFiles('client-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-release-

      - name: Generate Tauri icons
        run: |
          mkdir -p client-desktop/src-tauri/icons
          magick landing/media/logo.png -resize 512x512 client-desktop/src-tauri/icons/icon.png
          magick landing/media/logo.png -resize 256x256 client-desktop/src-tauri/icons/128x128.png
          magick landing/media/logo.png -resize 512x512 client-desktop/src-tauri/icons/128x128@2x.png
          magick landing/media/logo.png -resize 256x256 client-desktop/src-tauri/icons/icon.icns
          magick landing/media/logo.png -resize 256x256 client-desktop/src-tauri/icons/icon.ico
          magick landing/media/logo.png -resize 32x32 client-desktop/src-tauri/icons/32x32.png
          magick landing/media/logo.png -resize 512x512 client-desktop/src-tauri/icons/512x512.png
          magick landing/media/logo.png -resize 1024x1024 client-desktop/src-tauri/icons/512x512@2x.png
          magick landing/media/logo.png -resize 107x107 client-desktop/src-tauri/icons/Square107x107Logo.png
          magick landing/media/logo.png -resize 142x142 client-desktop/src-tauri/icons/Square142x142Logo.png
          magick landing/media/logo.png -resize 150x150 client-desktop/src-tauri/icons/Square150x150Logo.png
          magick landing/media/logo.png -resize 30x30 client-desktop/src-tauri/icons/Square30x30Logo.png
          magick landing/media/logo.png -resize 310x310 client-desktop/src-tauri/icons/Square310x310Logo.png
          magick landing/media/logo.png -resize 44x44 client-desktop/src-tauri/icons/Square44x44Logo.png
          magick landing/media/logo.png -resize 71x71 client-desktop/src-tauri/icons/Square71x71Logo.png
          magick landing/media/logo.png -resize 89x89 client-desktop/src-tauri/icons/Square89x89Logo.png
          magick landing/media/logo.png -resize 50x50 client-desktop/src-tauri/icons/StoreLogo.png

      - name: Build desktop app
        id: build
        working-directory: ./client-desktop
        continue-on-error: true
        run: |
          export GUARDYN_DOMAIN="${{ env.GUARDYN_DOMAIN }}"
          export WS_SECURE="${{ env.WS_SECURE }}"
          export WS_PORT="${{ env.WS_PORT }}"
          npm run tauri build -- --bundles dmg 2>&1 | tee ../tauri-build-macos.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-macos
          path: tauri-build-macos.log

      - name: Upload macOS desktop artifacts
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-release
          path: |
            client-desktop/target/release/bundle/**/*.dmg

  build-desktop-windows:
    name: Build Desktop Windows
    runs-on: windows-latest
    if: ${{ github.event.inputs.build-frontend == 'true' || github.event_name == 'push' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: |
          $PROTOC_VERSION = "27.3"
          $PROTOC_ZIP = "protoc-$PROTOC_VERSION-win64.zip"
          Invoke-WebRequest -Uri "https://github.com/protocolbuffers/protobuf/releases/download/v$PROTOC_VERSION/$PROTOC_ZIP" -OutFile "$env:TEMP\$PROTOC_ZIP"
          Expand-Archive -Path "$env:TEMP\$PROTOC_ZIP" -DestinationPath "$env:USERPROFILE\protoc"
          echo "$env:USERPROFILE\protoc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-desktop/package-lock.json

      - name: Install npm dependencies
        working-directory: ./client-desktop
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-release-${{ hashFiles('client-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-release-

      - name: Install ImageMagick
        run: choco install imagemagick -y --no-progress

      - name: Generate Tauri icons
        run: |
          New-Item -ItemType Directory -Path client-desktop/src-tauri/icons -Force
          magick convert landing/media/logo.png -resize 512x512 client-desktop/src-tauri/icons/icon.png
          magick convert landing/media/logo.png -resize 256x256 client-desktop/src-tauri/icons/128x128.png
          magick convert landing/media/logo.png -resize 512x512 client-desktop/src-tauri/icons/128x128@2x.png
          magick convert landing/media/logo.png -define icon:auto-resize=256,128,64,48,32,16 client-desktop/src-tauri/icons/icon.ico
          magick convert landing/media/logo.png -resize 32x32 client-desktop/src-tauri/icons/32x32.png
          magick convert landing/media/logo.png -resize 512x512 client-desktop/src-tauri/icons/512x512.png
          magick convert landing/media/logo.png -resize 1024x1024 client-desktop/src-tauri/icons/512x512@2x.png
          magick convert landing/media/logo.png -resize 107x107 client-desktop/src-tauri/icons/Square107x107Logo.png
          magick convert landing/media/logo.png -resize 142x142 client-desktop/src-tauri/icons/Square142x142Logo.png
          magick convert landing/media/logo.png -resize 150x150 client-desktop/src-tauri/icons/Square150x150Logo.png
          magick convert landing/media/logo.png -resize 30x30 client-desktop/src-tauri/icons/Square30x30Logo.png
          magick convert landing/media/logo.png -resize 310x310 client-desktop/src-tauri/icons/Square310x310Logo.png
          magick convert landing/media/logo.png -resize 44x44 client-desktop/src-tauri/icons/Square44x44Logo.png
          magick convert landing/media/logo.png -resize 71x71 client-desktop/src-tauri/icons/Square71x71Logo.png
          magick convert landing/media/logo.png -resize 89x89 client-desktop/src-tauri/icons/Square89x89Logo.png
          magick convert landing/media/logo.png -resize 50x50 client-desktop/src-tauri/icons/StoreLogo.png

      - name: Build desktop app
        id: build
        working-directory: ./client-desktop
        continue-on-error: true
        run: |
          $env:GUARDYN_DOMAIN="${{ env.GUARDYN_DOMAIN }}"
          $env:WS_SECURE="${{ env.WS_SECURE }}"
          $env:WS_PORT="${{ env.WS_PORT }}"
          npm run tauri build -- --bundles msi,nsis 2>&1 | tee ../tauri-build-windows.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-windows
          path: tauri-build-windows.log

      - name: Upload Windows desktop artifacts
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-release
          path: |
            client-desktop/target/release/bundle/**/*.msi
            client-desktop/target/release/bundle/**/*.exe

  build-mobile-android:
    name: Build Mobile Android
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build-frontend == 'true' || github.event_name == 'push' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ runner.os }}-release-${{ hashFiles('client-mobile/pubspec.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get install -y protobuf-compiler

      - name: Setup Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-mobile/native/target/
          key: ${{ runner.os }}-cargo-mobile-release-${{ hashFiles('client-mobile/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mobile-release-

      - name: Decode and setup keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > client-mobile/android/release.keystore
          cat > client-mobile/android/key.properties << EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Update Flutter dependencies
        working-directory: ./client-mobile
        run: |
          flutter pub upgrade --major-versions
          flutter pub get

      - name: Build Android APK
        working-directory: ./client-mobile
        run: |
          ./scripts/build-android.sh apk release ${{ env.GUARDYN_DOMAIN }} ${{ env.WS_SECURE }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-release
          path: |
            client-mobile/build/app/outputs/flutter-apk/app-release.apk
            client-mobile/build/app/outputs/bundle/release/app-release.aab
            client-mobile/dist/android/*.apk
            client-mobile/dist/android/*.aab

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: 
      - publish-backend
      - build-desktop-linux
      - build-desktop-macos
      - build-desktop-windows
      - build-mobile-android
    if: ${{ always() && github.event.inputs.publish-release == 'true' && 
            (needs.publish-backend.result == 'success' || needs.publish-backend.result == 'skipped') &&
            (needs.build-desktop-linux.result == 'success' || needs.build-desktop-linux.result == 'skipped') &&
            (needs.build-desktop-macos.result == 'success' || needs.build-desktop-macos.result == 'skipped') &&
            (needs.build-desktop-windows.result == 'success' || needs.build-desktop-windows.result == 'skipped') &&
            (needs.build-mobile-android.result == 'success' || needs.build-mobile-android.result == 'skipped') }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag name
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag_name=v$(date +'%Y.%m.%d')-manual" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la release-artifacts/
          for dir in release-artifacts/*/; do
            echo "Contents of ${dir}:"
            ls -la "${dir}" || true
          done

      - name: Prepare release files
        run: |
          mkdir -p release
          
          # Backend binaries
          if [ -d "release-artifacts/backend-release" ]; then
            find release-artifacts/backend-release -type f \( -name "*-service" -o -name "*.sig" -o -name "*.spdx.json" \) -exec cp {} release/ \; 2>/dev/null || true
          fi
          
          # Linux desktop
          if [ -d "release-artifacts/desktop-linux-release" ]; then
            find release-artifacts/desktop-linux-release -type f \( -name "*.deb" -o -name "*.AppImage" \) -exec cp {} release/ \; 2>/dev/null || true
          fi
          
          # macOS desktop
          if [ -d "release-artifacts/desktop-macos-release" ]; then
            find release-artifacts/desktop-macos-release -type f -name "*.dmg" -exec cp {} release/ \; 2>/dev/null || true
          fi
          
          # Windows desktop
          if [ -d "release-artifacts/desktop-windows-release" ]; then
            find release-artifacts/desktop-windows-release -type f \( -name "*.msi" -o -name "*.exe" \) -exec cp {} release/ \; 2>/dev/null || true
          fi
          
          # Android mobile
          if [ -d "release-artifacts/mobile-android-release" ]; then
            find release-artifacts/mobile-android-release -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} release/ \; 2>/dev/null || true
          fi
          
          echo "Files prepared for release:"
          ls -la release/

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          name: Release ${{ steps.get_tag.outputs.tag_name }}
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
