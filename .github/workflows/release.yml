name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-backend:
    name: Build & Publish Backend
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config cmake

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release artifacts
        working-directory: ./backend
        run: cargo build --release --locked

      - name: Install Syft for SBOM generation
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: syft dir:./backend -o spdx-json > sbom.spdx.json
        continue-on-error: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts
        run: |
          for binary in backend/target/release/*-service; do
            cosign sign-blob --yes \
              --output-signature "${binary}.sig" \
              "$binary" || true
          done
        continue-on-error: true

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-release
          path: |
            backend/target/release/*-service
            backend/target/release/*.sig
            sbom.spdx.json

  build-desktop-linux:
    name: Build Desktop Linux
    runs-on: ubuntu-latest
    needs: publish-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-desktop/package-lock.json

      - name: Install npm dependencies
        working-directory: ./client-desktop
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-release-${{ hashFiles('client-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-release-

      - name: Build desktop app
        working-directory: ./client-desktop
        run: npm run tauri build -- --bundles deb,appimage

      - name: Upload Linux desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-release
          path: |
            client-desktop/src-tauri/target/release/bundle/deb/*.deb
            client-desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  build-desktop-macos:
    name: Build Desktop macOS
    runs-on: macos-latest
    needs: publish-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-desktop/package-lock.json

      - name: Install npm dependencies
        working-directory: ./client-desktop
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-release-${{ hashFiles('client-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-release-

      - name: Build desktop app
        working-directory: ./client-desktop
        run: npm run tauri build -- --bundles dmg

      - name: Upload macOS desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-release
          path: client-desktop/src-tauri/target/release/bundle/dmg/*.dmg

  build-desktop-windows:
    name: Build Desktop Windows
    runs-on: windows-latest
    needs: publish-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-desktop/package-lock.json

      - name: Install npm dependencies
        working-directory: ./client-desktop
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-release-${{ hashFiles('client-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-release-

      - name: Build desktop app
        working-directory: ./client-desktop
        run: npm run tauri build -- --bundles msi,nsis

      - name: Upload Windows desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-release
          path: |
            client-desktop/src-tauri/target/release/bundle/msi/*.msi
            client-desktop/src-tauri/target/release/bundle/nsis/*.exe

  build-mobile-android:
    name: Build Mobile Android
    runs-on: ubuntu-latest
    needs: publish-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ runner.os }}-release-${{ hashFiles('client-mobile/pubspec.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-mobile/native/target/
          key: ${{ runner.os }}-cargo-mobile-release-${{ hashFiles('client-mobile/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mobile-release-

      - name: Build native libraries
        working-directory: ./client-mobile
        run: ./scripts/build-android.sh

      - name: Build Flutter APK
        working-directory: ./client-mobile
        run: flutter build apk --release

      - name: Build Flutter AppBundle
        working-directory: ./client-mobile
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-release
          path: |
            client-mobile/build/app/outputs/flutter-apk/app-release.apk
            client-mobile/build/app/outputs/bundle/release/app-release.aab

  build-mobile-ios:
    name: Build Mobile iOS
    runs-on: macos-latest
    needs: publish-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ runner.os }}-release-${{ hashFiles('client-mobile/pubspec.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust targets
        run: rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-mobile/native/target/
          key: ${{ runner.os }}-cargo-mobile-release-${{ hashFiles('client-mobile/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mobile-release-

      - name: Build native libraries
        working-directory: ./client-mobile
        run: ./scripts/build-ios.sh

      - name: Build Flutter iOS
        working-directory: ./client-mobile
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios-release
          path: client-mobile/build/ios/iphoneos/Runner.app

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-backend, build-desktop-linux, build-desktop-macos, build-desktop-windows, build-mobile-android, build-mobile-ios]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: ls -R release-artifacts

      - name: Package artifacts
        run: |
          mkdir -p release
          cd release-artifacts
          for dir in */; do
            tar -czf "../release/${dir%/}.tar.gz" "$dir"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.tar.gz
          fail_on_unmatched_files: false
