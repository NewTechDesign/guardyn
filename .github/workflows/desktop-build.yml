name: Desktop Build (Tauri)

on:
  push:
    branches: [main]
    paths:
      - 'client-desktop/**'
      - 'backend/crates/crypto/**'
      - 'backend/crates/common/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client-desktop/**'
      - 'backend/crates/crypto/**'
      - 'backend/crates/common/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS (Intel)
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS (Apple Silicon)

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-desktop/package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            protobuf-compiler

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Install frontend dependencies
        working-directory: client-desktop
        run: npm ci

      - name: Build frontend
        working-directory: client-desktop
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client-desktop
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guardyn-desktop-${{ matrix.target }}
          path: |
            client-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            client-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            client-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            client-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            client-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
          if-no-files-found: warn
          retention-days: 7

  test:
    needs: build
    strategy:
      matrix:
        include:
          - platform: ubuntu-22.04
            name: Linux
          - platform: windows-latest
            name: Windows
          - platform: macos-latest
            name: macOS

    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            protobuf-compiler

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Run Rust tests
        working-directory: client-desktop/src-tauri
        run: cargo test --all-features
