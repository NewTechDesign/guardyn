name: build

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'client-desktop/**'
      - 'client-mobile/**'
      - '.github/workflows/build.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'client-desktop/**'
      - 'client-mobile/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    name: Lint & Test (Backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config cmake

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        working-directory: ./backend
        run: cargo fmt --all -- --check

      - name: Run Clippy
        working-directory: ./backend
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Run tests
        working-directory: ./backend
        run: cargo test --workspace --exclude e2e-tests
        continue-on-error: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        working-directory: ./backend
        run: cargo audit
        continue-on-error: true

  build-desktop-linux:
    name: Build Desktop (Linux)
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-audit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-desktop/package-lock.json

      - name: Install npm dependencies
        working-directory: ./client-desktop
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('client-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-

      - name: Build desktop app
        working-directory: ./client-desktop
        run: npm run tauri build -- --bundles deb,appimage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            client-desktop/src-tauri/target/release/bundle/deb/*.deb
            client-desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  build-desktop-macos:
    name: Build Desktop (macOS)
    runs-on: macos-latest
    needs: [lint-and-test, security-audit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-desktop/package-lock.json

      - name: Install npm dependencies
        working-directory: ./client-desktop
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('client-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-

      - name: Build desktop app
        working-directory: ./client-desktop
        run: npm run tauri build -- --bundles dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: client-desktop/src-tauri/target/release/bundle/dmg/*.dmg

  build-desktop-windows:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    needs: [lint-and-test, security-audit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-desktop/package-lock.json

      - name: Install npm dependencies
        working-directory: ./client-desktop
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('client-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-

      - name: Build desktop app
        working-directory: ./client-desktop
        run: npm run tauri build -- --bundles msi,nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            client-desktop/src-tauri/target/release/bundle/msi/*.msi
            client-desktop/src-tauri/target/release/bundle/nsis/*.exe

  build-mobile-android:
    name: Build Mobile (Android)
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-audit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('client-mobile/pubspec.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android NDK
        run: |
          ANDROID_HOME=$HOME/Android/Sdk
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"

      - name: Setup Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-mobile/native/target/
          key: ${{ runner.os }}-cargo-mobile-${{ hashFiles('client-mobile/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mobile-

      - name: Build native libraries
        working-directory: ./client-mobile
        run: ./scripts/build-android.sh

      - name: Build Flutter APK
        working-directory: ./client-mobile
        run: flutter build apk --release

      - name: Build Flutter AppBundle
        working-directory: ./client-mobile
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          path: |
            client-mobile/build/app/outputs/flutter-apk/app-release.apk
            client-mobile/build/app/outputs/bundle/release/app-release.aab

  build-mobile-ios:
    name: Build Mobile (iOS)
    runs-on: macos-latest
    needs: [lint-and-test, security-audit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('client-mobile/pubspec.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust targets
        run: rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            client-mobile/native/target/
          key: ${{ runner.os }}-cargo-mobile-${{ hashFiles('client-mobile/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mobile-

      - name: Build native libraries
        working-directory: ./client-mobile
        run: ./scripts/build-ios.sh

      - name: Build Flutter iOS
        working-directory: ./client-mobile
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios
          path: client-mobile/build/ios/iphoneos/Runner.app
