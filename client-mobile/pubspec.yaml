name: guardyn_client
description: "Guardyn - Privacy-focused secure communication platform"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Functional Programming
  dartz: ^0.10.1

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # gRPC & Networking
  grpc: ^5.0.0
  protobuf: ^5.1.0
  fixnum: ^1.1.1

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Local Database (for future use)
  sqflite: ^2.3.0
  path: ^1.8.3

  # Utilities
  logger: ^2.0.2+1
  intl: ^0.20.2
  uuid: ^4.0.0

  # E2EE Cryptography - all crypto now uses CryptoPrimitives (Rust FFI / Dart fallback)
  # Pure Dart fallback for development/testing when native libraries are not built
  cryptography: ^2.7.0
  pinenacl: ^0.6.0

  # SVG Support
  flutter_svg: ^2.0.9

  # WebSocket for real-time messaging
  web_socket_channel: ^3.0.1

  # Notifications & Audio
  flutter_local_notifications: ^19.0.0
  audioplayers: ^6.1.0

  # WebRTC for Voice/Video Calls
  flutter_webrtc: ^0.12.5+hotfix.1

  # Rust FFI Bridge (for native cryptography)
  flutter_rust_bridge: ^2.0.0
  ffi: ^2.1.0
  freezed_annotation: ^2.4.1

  # Theme & Preferences
  shared_preferences: ^2.2.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Media Picking & Display
  image_picker: ^1.1.2
  file_picker: ^4.6.1
  cached_network_image: ^3.4.1
  video_player: ^2.9.3
  photo_view: ^0.15.0

  # File Handling
  mime: ^2.0.0
  path_provider: ^2.1.5
  http: ^1.2.2
  open_filex: ^4.6.0
  url_launcher: ^6.2.5
  share_plus: ^10.0.0

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  integration_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.6
  injectable_generator: ^2.4.1

  # Rust FFI Code Generation
  ffigen: ^20.1.1
  freezed: ^2.4.5

  # Testing
  mocktail: ^1.0.1
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.svg
    - assets/sounds/
    - assets/audio/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
