# Guardyn Service Monitors
# Phase 5: Launch Preparation - Monitoring + Alerting
# 
# ServiceMonitor resources for Prometheus Operator
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: auth-service-monitor
  namespace: observability
  labels:
    app: auth-service
    release: kube-prometheus-stack
    guardyn.io/stage: production
spec:
  namespaceSelector:
    matchNames:
      - apps
  selector:
    matchLabels:
      app: auth-service
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
      scheme: http
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
