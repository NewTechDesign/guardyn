# Guardyn Alertmanager Configuration
# Phase 5: Launch Preparation - Monitoring + Alerting
# 
# Alertmanager configuration for PagerDuty, Slack, and email notifications
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-guardyn-config
  namespace: observability
  labels:
    guardyn.io/stage: production
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      # PagerDuty integration (replace with your key)
      pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
      # Slack webhook (replace with your webhook)
      slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

    templates:
      - '/etc/alertmanager/config/*.tmpl'

    route:
      group_by: ['alertname', 'service', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default-receiver'
      routes:
        # Critical alerts go to PagerDuty immediately
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
          group_wait: 0s
          repeat_interval: 1h
          continue: true

        # SLO alerts have their own routing
        - match:
            slo: availability
          receiver: 'slo-alerts'
          group_by: ['alertname', 'slo']

        # Warning alerts go to Slack
        - match:
            severity: warning
          receiver: 'slack-warnings'
          repeat_interval: 12h

        # Backend team alerts
        - match:
            team: backend
          receiver: 'slack-backend'

        # Infrastructure team alerts
        - match:
            team: infrastructure
          receiver: 'slack-infrastructure'

    receivers:
      - name: 'default-receiver'
        slack_configs:
          - channel: '#guardyn-alerts'
            send_resolved: true
            title: '{{ .Status | toUpper }} {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Severity:* {{ .Labels.severity }}
              *Service:* {{ .Labels.service }}
              {{ end }}

      - name: 'pagerduty-critical'
        pagerduty_configs:
          - service_key_file: '/etc/alertmanager/secrets/pagerduty-key'
            severity: critical
            description: '{{ .CommonLabels.alertname }}'
            details:
              summary: '{{ .CommonAnnotations.summary }}'
              description: '{{ .CommonAnnotations.description }}'
              service: '{{ .CommonLabels.service }}'
              runbook_url: '{{ .CommonAnnotations.runbook_url }}'

      - name: 'slo-alerts'
        slack_configs:
          - channel: '#guardyn-slo'
            send_resolved: true
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
            title: 'SLO Alert: {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Error Budget:* Check Grafana SLO dashboard
              {{ end }}
            actions:
              - type: button
                text: 'View Dashboard'
                url: 'https://grafana.${DOMAIN}/d/guardyn-slo/slo-dashboard'
              - type: button
                text: 'Runbook'
                url: '{{ .CommonAnnotations.runbook_url }}'

      - name: 'slack-warnings'
        slack_configs:
          - channel: '#guardyn-warnings'
            send_resolved: true
            title: '⚠️ {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Summary:* {{ .Annotations.summary }}
              *Service:* {{ .Labels.service }}
              {{ end }}

      - name: 'slack-backend'
        slack_configs:
          - channel: '#guardyn-backend'
            send_resolved: true

      - name: 'slack-infrastructure'
        slack_configs:
          - channel: '#guardyn-infra'
            send_resolved: true

    inhibit_rules:
      # If critical, suppress warning for same service
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'service']

      # If service is down, suppress all other alerts for it
      - source_match:
          alertname: '.*ServiceDown'
        target_match_re:
          alertname: '.*'
        equal: ['service']
