# Guardyn Production Overrides
# Phase 5: Launch Preparation - Production K8s Deployment
# 
# This file contains production-specific configurations for all services.
# Includes: replicas, resources, HPA, PDB, anti-affinity, and security contexts.
---
# Auth Service - Production Configuration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: apps
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - auth-service
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: auth-service
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            - name: GUARDYN_OBSERVABILITY__LOG_LEVEL
              value: "info"
            - name: RUST_LOG
              value: "info,guardyn=info"
